backend:
  name: git-gateway
  branch: main

media_folder: "src/images"
public_folder: "/images"

collections:
  - name: "nieuws"
    label: "Nieuws"
    folder: "src/nieuws"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Samenvatting", name: "summary", widget: "text", hint: "Korte samenvatting die zichtbaar is als het bericht is ingeklapt." }
      - { label: "Afbeelding", name: "image", widget: "image", required: false }
      - { label: "Alt-tekst afbeelding", name: "imageAlt", widget: "string", required: false }
      - { label: "Inhoud", name: "body", widget: "markdown" }

  - name: "agenda"
    label: "Agenda"
    folder: "src/agenda"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Samenvatting", name: "summary", widget: "text" }
      - { label: "Inhoud", name: "body", widget: "markdown", required: false }

  - name: "paginas"
    label: "Pagina-inhoud"
    files:
      - label: "Homepage"
        name: "homepage"
        file: "src/_data/homepage.json"
        fields:
          - label: "Intro"
            name: "intro"
            widget: "object"
            fields:
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Tekst", name: "tekst", widget: "text" }
          - label: "Natuurhuisje sectie"
            name: "natuurhuisje"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Tekst", name: "tekst", widget: "text" }
              - { label: "Hoofdfoto", name: "hoofdfoto", widget: "image" }
              - { label: "Hoofdfoto alt-tekst", name: "hoofdfoto_alt", widget: "string" }
              - label: "Foto's"
                name: "fotos"
                widget: "list"
                fields:
                  - { label: "Foto", name: "src", widget: "image" }
                  - { label: "Alt-tekst", name: "alt", widget: "string" }
              - label: "Kenmerken"
                name: "kenmerken"
                widget: "list"
                field: { label: "Kenmerk", name: "kenmerk", widget: "string" }
          - label: "Voedselbos sectie"
            name: "voedselbos"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Tekst", name: "tekst", widget: "text" }
              - label: "Foto's"
                name: "fotos"
                widget: "list"
                fields:
                  - { label: "Foto", name: "src", widget: "image" }
                  - { label: "Alt-tekst", name: "alt", widget: "string" }
          - label: "Groepsruimte sectie"
            name: "groepsruimte"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Tekst", name: "tekst", widget: "text" }
              - label: "Foto's"
                name: "fotos"
                widget: "list"
                fields:
                  - { label: "Foto", name: "src", widget: "image" }
                  - { label: "Alt-tekst", name: "alt", widget: "string" }
          - label: "Quote"
            name: "quote"
            widget: "object"
            fields:
              - { label: "Tekst", name: "tekst", widget: "text" }
              - { label: "Auteur", name: "auteur", widget: "string" }

      - label: "Natuurhuisje Acasia"
        name: "pagina_natuurhuisje"
        file: "src/_data/pagina_natuurhuisje.json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Tekst", name: "tekst", widget: "text" }
              - { label: "Hoofdfoto", name: "hoofdfoto", widget: "image" }
              - { label: "Hoofdfoto alt-tekst", name: "hoofdfoto_alt", widget: "string" }
          - label: "Het huisje"
            name: "huisje"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Tekst", name: "tekst", widget: "text" }
              - { label: "Tekst (vervolg)", name: "tekst2", widget: "text", required: false }
              - label: "Foto's"
                name: "fotos"
                widget: "list"
                fields:
                  - { label: "Foto", name: "src", widget: "image" }
                  - { label: "Alt-tekst", name: "alt", widget: "string" }
          - label: "Omgeving"
            name: "omgeving"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Tekst", name: "tekst", widget: "text" }
              - { label: "Tekst (vervolg)", name: "tekst2", widget: "text", required: false }
              - { label: "Tekst (vervolg 2)", name: "tekst3", widget: "text", required: false }
          - label: "Veelgestelde vragen"
            name: "faq"
            widget: "list"
            fields:
              - { label: "Vraag", name: "vraag", widget: "string" }
              - { label: "Antwoord", name: "antwoord", widget: "text" }

      - label: "Voedselbos"
        name: "pagina_voedselbos"
        file: "src/_data/pagina_voedselbos.json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Tekst", name: "tekst", widget: "text" }
              - label: "Foto's"
                name: "fotos"
                widget: "list"
                fields:
                  - { label: "Foto", name: "src", widget: "image" }
                  - { label: "Alt-tekst", name: "alt", widget: "string" }
          - label: "Werkwijze"
            name: "werkwijze"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Tekst", name: "tekst", widget: "text" }
              - label: "Foto's"
                name: "fotos"
                widget: "list"
                fields:
                  - { label: "Foto", name: "src", widget: "image" }
                  - { label: "Alt-tekst", name: "alt", widget: "string" }
              - label: "Statistieken"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Nummer", name: "nummer", widget: "string" }
                  - { label: "Label", name: "label", widget: "string" }
          - label: "Het land"
            name: "land"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Tekst", name: "tekst", widget: "text" }
              - { label: "Tekst (vervolg)", name: "tekst2", widget: "text", required: false }
              - label: "Foto's"
                name: "fotos"
                widget: "list"
                fields:
                  - { label: "Foto", name: "src", widget: "image" }
                  - { label: "Alt-tekst", name: "alt", widget: "string" }
          - label: "Verbond"
            name: "verbond"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Tekst", name: "tekst", widget: "text" }
              - { label: "Tekst (vervolg)", name: "tekst2", widget: "text", required: false }
          - label: "Een plek"
            name: "plek"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Tekst", name: "tekst", widget: "text" }
          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Tekst", name: "tekst", widget: "text" }

      - label: "Groepsruimte"
        name: "pagina_groepsruimte"
        file: "src/_data/pagina_groepsruimte.json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Tekst", name: "tekst", widget: "text" }
              - label: "Foto's"
                name: "fotos"
                widget: "list"
                fields:
                  - { label: "Foto", name: "src", widget: "image" }
                  - { label: "Alt-tekst", name: "alt", widget: "string" }
          - label: "De ruimte"
            name: "ruimte"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Tekst", name: "tekst", widget: "text" }
              - { label: "Tekst (vervolg)", name: "tekst2", widget: "text", required: false }
              - label: "Foto's"
                name: "fotos"
                widget: "list"
                fields:
                  - { label: "Foto", name: "src", widget: "image" }
                  - { label: "Alt-tekst", name: "alt", widget: "string" }
          - label: "Voorzieningen"
            name: "voorzieningen"
            widget: "list"
            fields:
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Tekst", name: "tekst", widget: "text" }
          - label: "Sfeer"
            name: "sfeer"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Tekst", name: "tekst", widget: "text" }
              - label: "Foto's"
                name: "fotos"
                widget: "list"
                fields:
                  - { label: "Foto", name: "src", widget: "image" }
                  - { label: "Alt-tekst", name: "alt", widget: "string" }
          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Tekst", name: "tekst", widget: "text" }

  - name: "instellingen"
    label: "Instellingen"
    files:
      - label: "Site-informatie"
        name: "site"
        file: "src/_data/site.json"
        fields:
          - { label: "Titel", name: "title", widget: "string" }
          - { label: "Beschrijving", name: "description", widget: "text" }
          - { label: "URL", name: "url", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "E-mail", name: "email", widget: "string" }
          - { label: "Telefoon (internationaal)", name: "phone", widget: "string" }
          - { label: "Telefoon (weergave)", name: "phoneDisplay", widget: "string" }
          - { label: "Instagram URL", name: "instagram", widget: "string" }
          - label: "Adres"
            name: "address"
            widget: "object"
            fields:
              - { label: "Straat", name: "street", widget: "string" }
              - { label: "Postcode", name: "postalCode", widget: "string" }
              - { label: "Plaats", name: "city", widget: "string" }
              - { label: "Provincie", name: "region", widget: "string" }
              - { label: "Land", name: "country", widget: "string" }
          - label: "Coördinaten"
            name: "geo"
            widget: "object"
            fields:
              - { label: "Breedtegraad", name: "latitude", widget: "number", value_type: "float" }
              - { label: "Lengtegraad", name: "longitude", widget: "number", value_type: "float" }

      - label: "Team"
        name: "team"
        file: "src/_data/team.json"
        fields:
          - { label: "Introductie", name: "intro", widget: "text" }
          - { label: "Introductie (vervolg)", name: "intro2", widget: "text" }
          - label: "Teamleden"
            name: "members"
            widget: "list"
            fields:
              - { label: "Naam", name: "name", widget: "string" }
              - { label: "Rol", name: "role", widget: "string" }
              - { label: "Afbeelding", name: "image", widget: "image" }

      - label: "Groepsruimte prijzen"
        name: "groepsruimte_prijzen"
        file: "src/_data/groepsruimte_prijzen.json"
        fields:
          - label: "Tarieven"
            name: "tarieven"
            widget: "list"
            fields:
              - { label: "Optie", name: "optie", widget: "string" }
              - { label: "Tijden", name: "tijden", widget: "string" }
              - { label: "Prijs", name: "prijs", widget: "string" }
          - { label: "Opmerking", name: "opmerking", widget: "text" }
